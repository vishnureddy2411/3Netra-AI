# ─────────────────────────────────────────────────────────────────────────────
# WORKFLOW STAGE DEFINITIONS
# ─────────────────────────────────────────────────────────────────────────────

workflow_stages:

  - stage_id: 1
    name: "planning"
    display_name: "Planning"
    active_agent: "planning_agent"
    active_roles:
      - "Product Engineer"
      - "Tech Lead"
      - "Software Architect"
    output:
      - "Project goal and business context"
      - "Target user definition"
      - "MVP feature list"
      - "Technology stack decision"
      - "Timeline and milestones"
      - "Risk assessment"
    user_approval_required: true
    approval_prompt: "Does this project plan match your vision? Approve to move to architecture."

  - stage_id: 2
    name: "architecture"
    display_name: "Architecture"
    active_agent: "review_agent"
    supporting_agents:
      - "backend_agent"
      - "database_agent"
      - "devops_agent"
      - "security_agent"
    active_roles:
      - "Software Architect"
      - "Backend Engineer"
      - "Database Engineer"
      - "DevOps Engineer"
      - "Security Engineer"
    output:
      - "Frontend component structure"
      - "Backend service architecture"
      - "Database schema design"
      - "API contract definitions"
      - "Authentication and authorization flow"
      - "Deployment architecture"
      - "Security plan"
    user_approval_required: true
    approval_prompt: "Review the architecture design. Approve to begin code generation."

  - stage_id: 3
    name: "frontend_build"
    display_name: "Frontend Build"
    active_agent: "frontend_agent"
    active_roles:
      - "Frontend Engineer"
      - "UI Engineer"
      - "Design Systems Engineer"
      - "Accessibility Engineer"
    output:
      - "One page or component at a time"
      - "File changes summary"
      - "Component preview"
    user_approval_required: true
    approval_prompt: "Review this component. Approve to continue or request changes."

  - stage_id: 4
    name: "backend_build"
    display_name: "Backend Build"
    active_agent: "backend_agent"
    supporting_agents:
      - "database_agent"
      - "security_agent"
    active_roles:
      - "Backend Engineer"
      - "API Engineer"
      - "Database Engineer"
      - "Security Engineer"
    output:
      - "One backend feature at a time"
      - "API route definition"
      - "Request and response schema"
      - "Validation and error handling"
      - "File changes summary"
    user_approval_required: true
    approval_prompt: "Review this backend feature. Approve to continue or request changes."

  - stage_id: 5
    name: "integration"
    display_name: "Integration"
    active_agent: "backend_agent"
    supporting_agents:
      - "frontend_agent"
      - "testing_agent"
    active_roles:
      - "Full-Stack Engineer"
      - "Integration Engineer"
      - "QA Engineer"
    output:
      - "Frontend and backend connected"
      - "API shape verified"
      - "Loading and error states validated"
      - "Data persistence confirmed"
    user_approval_required: true
    approval_prompt: "Confirm frontend and backend are connected correctly."

  - stage_id: 6
    name: "testing"
    display_name: "Testing"
    active_agent: "testing_agent"
    supporting_agents:
      - "security_agent"
    active_roles:
      - "QA Engineer"
      - "SDET"
      - "Security Testing Engineer"
      - "Performance Test Engineer"
    output:
      - "Unit test suite"
      - "API test cases"
      - "End-to-end test scenarios"
      - "Edge case coverage"
      - "Security test results"
      - "Performance baseline"
    user_approval_required: true
    approval_prompt: "Review test results and coverage. Approve to proceed to deployment."

  - stage_id: 7
    name: "deployment"
    display_name: "Deployment"
    active_agent: "devops_agent"
    active_roles:
      - "DevOps Engineer"
      - "Cloud Engineer"
      - "Site Reliability Engineer / SRE"
    output:
      - "Docker configuration"
      - "Environment variable setup"
      - "CI/CD pipeline configuration"
      - "Monitoring and alerting setup"
      - "Production readiness checklist"
    user_approval_required: true
    approval_prompt: "Review deployment configuration. Approve to finalize."

  - stage_id: 8
    name: "final_review"
    display_name: "Final Review"
    active_agent: "review_agent"
    supporting_agents:
      - "loop_engineer"
    active_roles:
      - "Staff Engineer"
      - "Principal Engineer"
      - "Loop Engineer"
    output:
      - "Complete project review"
      - "What was built summary"
      - "What remains pending"
      - "Improvement recommendations"
      - "Deployment readiness assessment"
    user_approval_required: false
    approval_prompt: null